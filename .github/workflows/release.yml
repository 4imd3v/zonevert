name: Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      target: linux
                      command: pnpm run package:linux
                    - os: windows-latest
                      target: windows
                      command: pnpm run package:windows

        runs-on: ${{ matrix.os }}

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install Linux dependencies
              if: matrix.os == 'ubuntu-latest'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

            - name: Install
              run: pnpm install --frozen-lockfile

            - name: Fetch bundled ffmpeg sidecar
              shell: bash
              run: |
                set -euo pipefail
                mkdir -p src-tauri/binaries
                if [ "${{ matrix.target }}" = "linux" ]; then
                  # johnvansickle.com static build (glibc)
                  curl -fsSL -o ffmpeg.tar.xz \
                    https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
                  tar -xf ffmpeg.tar.xz
                  cp ffmpeg-*-amd64-static/ffmpeg src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu
                else
                  # BtbN Windows build (LGPL shared)
                  curl -fsSL -o ffmpeg.zip \
                    https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip
                  (command -v unzip >/dev/null && unzip -o ffmpeg.zip) || \
                    (powershell -Command "Expand-Archive ffmpeg.zip -DestinationPath .")
                  cp ffmpeg-master-latest-win64-gpl-shared/bin/ffmpeg.exe \
                    src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
                fi
                ls -la src-tauri/binaries

            - name: Check
              run: pnpm run check

            - name: Typecheck
              run: pnpm run typecheck

            - name: Package
              run: ${{ matrix.command }}

            - uses: actions/upload-artifact@v4
              with:
                  name: zonevert-${{ matrix.target }}
                  path: |
                      src-tauri/target/release/bundle/deb/*.deb
                      src-tauri/target/release/bundle/appimage/*.AppImage
                      src-tauri/target/release/bundle/nsis/*.exe
                      src-tauri/target/release/bundle/msi/*.msi

    release:
        needs: build
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/v')

        steps:
            - uses: actions/download-artifact@v4
              with:
                  path: artifacts

            - name: Flatten artifacts
              run: |
                  mkdir -p release-assets
                  find artifacts -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.exe" -o -name "*.msi" \) -exec cp {} release-assets/ \;
                  ls -la release-assets/

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true
                  files: release-assets/*
